<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — HM Creative</title>

  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="css/admin.css" />

  <!-- Firebase CDN (compat) -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="js/firebase-config.js"></script>
</head>
<body>

<div class="login-bg-orb login-bg-orb-1"></div>
<div class="login-bg-orb login-bg-orb-2"></div>

<div class="login-page">
  <div class="login-card">

    <div class="login-icon-wrap">
      <i class="fas fa-shield-halved"></i>
    </div>

    <div class="login-logo">HM <span>Creative</span></div>
    <p class="login-subtitle">Admin Panel — Restricted Access Only</p>

    <form id="loginForm" novalidate>

      <div class="form-group">
        <label for="adminEmail">Email Address</label>
        <div class="input-wrap">
          <i class="fas fa-envelope"></i>
          <input
            type="email"
            id="adminEmail"
            name="email"
            placeholder="admin@hmcreative.com"
            autocomplete="email"
            required
          />
        </div>
      </div>

      <div class="form-group">
        <label for="adminPassword">Password</label>
        <div class="input-wrap">
          <i class="fas fa-lock"></i>
          <input
            type="password"
            id="adminPassword"
            name="password"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          />
          <button type="button" class="pw-toggle" id="pwToggle" aria-label="Toggle password">
            <i class="fas fa-eye" id="pwIcon"></i>
          </button>
        </div>
      </div>

      <button type="submit" class="btn btn-gold" id="loginBtn"
        style="width:100%;justify-content:center;padding:0.85rem;margin-top:0.5rem;">
        <i class="fas fa-sign-in-alt"></i> Sign In to Admin
      </button>

    </form>

    <a href="../user/index.html" class="login-back">
      <i class="fas fa-arrow-left"></i> Back to Portfolio
    </a>

  </div>
</div>

<div class="toast" id="toast"></div>

<script src="js/auth.js"></script>
<script>
document.getElementById("pwToggle").addEventListener("click", () => {
  const input = document.getElementById("adminPassword");
  const icon  = document.getElementById("pwIcon");
  const shown = input.type === "text";
  input.type     = shown ? "password" : "text";
  icon.className = shown ? "fas fa-eye" : "fas fa-eye-slash";
});
</script>
</body>
</html>
