<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chats — HM Creative Admin</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="css/admin.css" />

  <!-- Firebase CDN (compat) -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="js/firebase-config.js"></script>

  <style>
    /* Full-height chat layout override */
    .page-body {
      padding: 1.75rem;
      height: calc(100vh - var(--topbar-h));
      display: flex;
      flex-direction: column;
    }

    .chats-layout {
      flex: 1;
      min-height: 0;
    }
  </style>
</head>
<body>

<div class="admin-layout">

  <!-- ── SIDEBAR ── -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <a href="dashboard.html">HM <span>Creative</span></a>
      <div class="sidebar-badge">Admin Panel</div>
    </div>
    <nav class="sidebar-nav">
      <span class="nav-section-label">Main</span>
      <a href="dashboard.html"    class="nav-link"><i class="fas fa-gauge-high"></i> Dashboard</a>
      <a href="projects.html"     class="nav-link"><i class="fas fa-photo-film"></i> Projects</a>
      <a href="chats.html"        class="nav-link"><i class="fas fa-comments"></i> Chats <span class="nav-badge" id="totalUnread" style="display:none"></span></a>
      <a href="categories.html"   class="nav-link"><i class="fas fa-layer-group"></i> Categories</a>
      <a href="social-links.html" class="nav-link"><i class="fas fa-share-nodes"></i> Social Links</a>
      <span class="nav-section-label">Site</span>
      <a href="../user/index.html" class="nav-link" target="_blank"><i class="fas fa-external-link-alt"></i> View Portfolio</a>
    </nav>
    <div class="sidebar-bottom">
      <div class="sidebar-user">
        <img src="" alt="Admin" id="navAdminAvatar" />
        <div class="sidebar-user-info">
          <div class="sidebar-user-name" id="navAdminName">Admin</div>
          <div class="sidebar-user-role">Administrator</div>
        </div>
      </div>
      <button id="logoutBtn" style="width:100%;"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>
  </aside>

  <!-- ── MAIN ── -->
  <div class="main-content">
    <div class="topbar">
      <div class="topbar-left">
        <button class="sidebar-toggle" id="sidebarToggle"><i class="fas fa-bars"></i></button>
        <span class="topbar-title"><i class="fas fa-comments" style="color:var(--gold);margin-right:0.5rem;"></i> Chat Manager</span>
      </div>
      <div class="topbar-right">
        <span id="onlineLabel" class="badge badge-success" style="display:none;">
          <i class="fas fa-circle" style="font-size:0.55rem;"></i> Live
        </span>
      </div>
    </div>

    <div class="page-body">

      <div class="chats-layout">

        <!-- ── Left: User list ── -->
        <div class="chat-users-panel">
          <div class="chat-panel-header">
            <h3>Conversations</h3>
            <div class="chat-user-search">
              <i class="fas fa-search"></i>
              <input type="text" id="userSearch" placeholder="Search users…" />
            </div>
          </div>
          <div class="chat-user-list" id="chatUserList">
            <!-- Loaded by chats.js -->
            <div class="chat-list-empty">
              <i class="fas fa-spinner fa-spin"></i>
              <p>Loading chats…</p>
            </div>
          </div>
        </div>

        <!-- ── Right: Thread ── -->

        <!-- Empty state (no conversation selected) -->
        <div class="chat-empty-state" id="chatEmpty">
          <i class="fas fa-comments"></i>
          <p>Select a conversation to start chatting</p>
        </div>

        <!-- Chat panel (hidden until user selected) -->
        <div class="chat-thread-panel" id="chatPanel" style="display:none;">

          <!-- Thread header -->
          <div class="chat-thread-header">
            <div class="thread-user-avatar" id="threadAvatar">U</div>
            <div class="thread-user-info">
              <div class="thread-user-name" id="chatTitle">User</div>
              <div class="thread-user-sub"  id="chatSubtitle"></div>
            </div>
            <span class="badge badge-success" style="margin-left:auto;">
              <i class="fas fa-circle" style="font-size:0.5rem;"></i> Active
            </span>
          </div>

          <!-- Messages -->
          <div id="chatMessages"></div>

          <!-- Reply bar -->
          <div class="chat-reply-bar">
            <!-- Reply Preview Widget -->
            <div class="chat-reply-preview" id="replyPreview">
              <div class="reply-preview-info">
                <span class="reply-preview-sender" id="replySender">Replying to User</span>
                <span class="reply-preview-text" id="replyText">Message text preview...</span>
              </div>
              <button class="reply-preview-close" id="cancelReplyBtn" type="button" aria-label="Cancel reply">
                <i class="fas fa-times"></i>
              </button>
            </div>

            <div class="chat-reply-input-row">
              <div class="reply-input-wrap">
                <textarea
                  id="chatInput"
                  placeholder="Type your reply…"
                  rows="1"
                  maxlength="500"
                  aria-label="Reply message"
                ></textarea>
                <div class="reply-footer">
                  <span id="charCount">0/500</span>
                </div>
              </div>
              <button id="sendBtn" aria-label="Send reply" title="Send (Enter)">
                <i class="fas fa-paper-plane"></i>
              </button>
            </div>
          </div>

        </div><!-- end chat-thread-panel -->

      </div><!-- end chats-layout -->

    </div><!-- end page-body -->
  </div><!-- end main-content -->
</div><!-- end admin-layout -->

<div class="toast" id="toast"></div>

<script src="js/auth.js"></script>
<script src="js/chats.js"></script>
<script>
/* ── Auto-resize textarea ── */
const chatInput = document.getElementById("chatInput");
chatInput?.addEventListener("input", () => {
  chatInput.style.height = "auto";
  chatInput.style.height = Math.min(chatInput.scrollHeight, 100) + "px";
});

/* ── Show live indicator after load ── */
setTimeout(() => {
  const badge = document.getElementById("onlineLabel");
  if (badge) badge.style.display = "inline-flex";
}, 2000);
</script>
</body>
</html>
